<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NovaCS · Superadmin Access</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy-900:#0d1b2a;--navy-700:#1e3a5f;--navy-600:#2452a0;--navy-500:#2d64c8;
  --slate-900:#0f172a;--slate-700:#334155;--slate-500:#64748b;--slate-400:#94a3b8;
  --slate-200:#e2e8f0;--slate-100:#f1f5f9;--slate-50:#f8fafc;
  --danger:#dc2626;--danger-bg:#fff5f5;
  --white:#ffffff;--r:10px;--r-sm:7px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.12);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18);
}
body{font-family:'Figtree',sans-serif;background:var(--navy-900);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

/* Subtle grid background */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}

.card{background:var(--white);border-radius:16px;box-shadow:var(--shadow-xl);width:100%;max-width:400px;overflow:hidden;position:relative;z-index:1;}

.card-top{background:linear-gradient(135deg,var(--navy-900) 0%,#1a2e5c 100%);padding:32px 32px 28px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);}

.logo{display:inline-flex;align-items:baseline;gap:0;margin-bottom:16px;}
.logo-nova{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px;}
.logo-cs{font-family:'Figtree',sans-serif;font-size:13px;font-weight:700;color:#7ea8e8;vertical-align:super;margin-left:2px;}

.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:5px 12px;font-size:11.5px;font-weight:700;color:#94b8e8;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px;}
.badge::before{content:'⚡';font-size:11px;}

.card-title{font-size:13px;color:rgba(255,255,255,.5);font-weight:400;}

.card-body{padding:28px 32px 32px;}

.field-label{display:block;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--slate-500);margin-bottom:6px;}
.field-input{width:100%;padding:10px 13px;border:1.5px solid var(--slate-200);border-radius:var(--r-sm);font-family:'Figtree',sans-serif;font-size:13.5px;color:var(--slate-900);background:var(--white);transition:border-color .15s;outline:none;margin-bottom:14px;}
.field-input:focus{border-color:var(--navy-500);}
.field-input:last-of-type{margin-bottom:0;}

.field-group{margin-bottom:14px;}

.btn-submit{width:100%;padding:12px;background:var(--navy-700);color:#fff;font-family:'Figtree',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:var(--r-sm);cursor:pointer;transition:all .17s;margin-top:20px;letter-spacing:.2px;}
.btn-submit:hover{background:var(--navy-600);transform:translateY(-1px);box-shadow:0 4px 14px rgba(36,82,160,.35);}
.btn-submit:active{transform:none;}

.error-msg{background:var(--danger-bg);border:1.5px solid #fecaca;border-radius:var(--r-sm);padding:10px 13px;font-size:12.5px;color:var(--danger);font-weight:600;margin-top:14px;display:none;}
.error-msg.show{display:block;}

.divider{border:none;border-top:1px solid var(--slate-100);margin:20px 0;}

.back-link{text-align:center;font-size:12.5px;color:var(--slate-400);}
.back-link a{color:var(--navy-600);font-weight:600;text-decoration:none;}
.back-link a:hover{text-decoration:underline;}

.security-note{display:flex;align-items:flex-start;gap:8px;background:var(--slate-50);border:1px solid var(--slate-200);border-radius:var(--r-sm);padding:10px 13px;font-size:12px;color:var(--slate-500);line-height:1.5;margin-bottom:20px;}
.security-note svg{width:14px;height:14px;stroke:var(--slate-400);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0;margin-top:1px;}

.footer-note{margin-top:20px;text-align:center;font-size:11.5px;color:rgba(255,255,255,.3);}
</style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <div class="logo"><span class="logo-nova">Nova</span><span class="logo-cs">CS</span></div>
    <div><span class="badge">Superadmin Portal</span></div>
    <div class="card-title">Restricted access — authorised personnel only</div>
  </div>

  <div class="card-body">
    <div class="security-note">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      This portal is for NovaCS platform administrators only. All access attempts are logged.
    </div>

    <div class="field-group">
      <label class="field-label">Admin Email</label>
      <input class="field-input" type="email" id="sa-email" placeholder="admin@novacs.io" autocomplete="username"/>
    </div>

    <div class="field-group">
      <label class="field-label">Password</label>
      <input class="field-input" type="password" id="sa-pass" placeholder="••••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>

    <div class="error-msg" id="error-msg">⚠ Invalid credentials. Access denied.</div>

    <button class="btn-submit" onclick="doLogin()">Access Admin Panel →</button>

    <hr class="divider"/>
    <div class="back-link">Not an admin? <a href="login.html">Recruiter login →</a></div>
  </div>
</div>

<div class="footer-note">NovaCS · Client Systems &amp; Digital Solutions · Secure Admin Access</div>

<script src="../js/db.js"></script>
<script>
// Demo superadmin credentials (in production, replace with real auth)
const SUPERADMIN_EMAIL    = 'admin@novacs.io';
const SUPERADMIN_PASSWORD = 'NovaCS@2026';

function doLogin(){
  const email = document.getElementById('sa-email').value.trim().toLowerCase();
  const pass  = document.getElementById('sa-pass').value;
  const err   = document.getElementById('error-msg');

  err.classList.remove('show');

  if(!email || !pass){
    err.textContent = '⚠ Please enter your email and password.';
    err.classList.add('show');
    return;
  }

  // Check against DB superadmin user
  const adminUser = DB.users.find(u => u.role === 'superadmin' && u.email === email);

  if(adminUser && pass === SUPERADMIN_PASSWORD){
    // Store admin session
    sessionStorage.setItem('novaCS_admin_session', JSON.stringify({
      name:  adminUser.name,
      email: adminUser.email,
      role:  adminUser.role,
      loginTime: new Date().toISOString()
    }));
    window.location.href = 'admin.html';
  } else {
    err.textContent = '⚠ Invalid credentials. Access denied.';
    err.classList.add('show');
    document.getElementById('sa-pass').value = '';
    document.getElementById('sa-pass').focus();
  }
}

// Auto-focus
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sa-email').focus();
});
</script>
</body>
</html>
